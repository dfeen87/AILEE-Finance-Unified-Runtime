name: CI

on:
  push:
  pull_request:

jobs:
  build-and-simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import sanity check
        run: |
          python -c "import importlib.util; spec = importlib.util.spec_from_file_location('aille_simulation', 'simulations/aille_simulation.py'); module = importlib.util.module_from_spec(spec); spec.loader.exec_module(module); print('Imported simulation module successfully')"

      - name: Run deterministic simulation
        run: |
          python simulations/aille_simulation.py
